name: Test and Coverage

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.os }}, Java ${{ matrix.java }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        java: [21, 23]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: false

      - name: Run Tests with Coverage
        run: ./gradlew test jacocoTestReport

      - name: Upload JaCoCo XML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-${{ matrix.os }}-java-${{ matrix.java }}
          path: build/reports/jacoco/test/jacocoTestReport.xml
          retention-days: 7

  coverage-comment:
    name: Add PR Coverage Comment
    needs: test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all JaCoCo reports
        uses: actions/download-artifact@v4
        with:
          path: jacoco-reports
          pattern: jacoco-report-*
          merge-multiple: true

      - name: Post JaCoCo Report Comment
        uses: Madrapps/jacoco-report@v1.7.2
        with:
          paths: jacoco-reports/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 0
          min-coverage-changed-files: 0
          title: "Code Coverage Report"
          update-comment: true
